<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYPER GOLF 管理画面</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="logo">⛳ HYPER GOLF</div>
      <h1>管理画面</h1>
    </header>

    <!-- ログイン -->
    <section id="panel-login" class="card">
      <h2>管理者ログイン</h2>
      <div class="form-group">
        <label for="admin-password">パスワード</label>
        <input type="password" id="admin-password" placeholder="パスワードを入力" />
      </div>
      <button class="btn btn-primary" id="btn-login">ログイン</button>
      <div id="login-error" class="error-msg hidden"></div>
    </section>

    <!-- 管理パネル -->
    <div id="admin-panel" class="hidden">

      <!-- 設定 -->
      <section class="card">
        <h2>⚙️ イベント設定</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="event-date">イベント日</label>
            <input type="date" id="event-date" />
          </div>
          <div class="form-group">
            <label for="start-time">開始時刻</label>
            <input type="time" id="start-time" step="1800" />
          </div>
          <div class="form-group">
            <label for="end-time">終了時刻</label>
            <input type="time" id="end-time" step="1800" />
          </div>
        </div>
        <button class="btn btn-primary" id="btn-save-settings">設定を保存</button>
        <div id="settings-msg" class="success-msg hidden"></div>
      </section>

      <!-- 予約一覧 -->
      <section class="card">
        <div class="list-header">
          <h2>📋 予約一覧</h2>
          <div class="list-controls">
            <select id="filter-status">
              <option value="all">すべて</option>
              <option value="confirmed">確定のみ</option>
              <option value="cancelled">キャンセルのみ</option>
            </select>
            <button class="btn btn-secondary btn-sm" id="btn-export">CSV出力</button>
            <button class="btn btn-secondary btn-sm" id="btn-reload">🔄 再読込</button>
          </div>
        </div>
        <div id="reservations-loading" class="loading-msg">読み込み中…</div>
        <div id="reservations-error" class="error-msg hidden"></div>
        <div class="table-wrap">
          <table id="reservations-table" class="hidden">
            <thead>
              <tr>
                <th>日付</th>
                <th>時間</th>
                <th>お名前</th>
                <th>電話番号</th>
                <th>お悩み</th>
                <th>ステータス</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="reservations-tbody"></tbody>
          </table>
        </div>
        <div id="no-reservations" class="empty-msg hidden">予約はまだありません。</div>
      </section>

    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // GAS Web App URL を設定してください
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzjJOPR_MhcgbSuRvMGpyuoHpUphiY6-YtOkfTkc2o938zChe3NjX0_KSnhDmHp94EpSg/exec';
    initAdmin(GAS_URL);
  </script>
</body>
</html>
